<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>{% block title %}School System{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    nav {
      background-color: #2c3e50;
      padding: 1rem 2rem;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      align-items: center;
      margin: 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* Right-side auth area */
    .nav-auth {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-auth .user-greeting {
      color: rgba(255, 255, 255, 0.75);
      font-size: .875rem;
    }

    .nav-auth .user-greeting strong {
      color: white;
    }

    .nav-profile-link {
      display: flex;
      align-items: center;
      gap: 6px;
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: .875rem;
      padding: .3rem .75rem;
      border-radius: 6px;
      border: 1.5px solid rgba(255, 255, 255, .3);
      transition: background .2s, border-color .2s;
    }

    .nav-profile-link:hover {
      background: rgba(255, 255, 255, .1);
      border-color: rgba(255, 255, 255, .6);
      text-decoration: none;
      color: white;
    }

    .nav-profile-link svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }

    .btn-nav-logout {
      background: rgba(231, 76, 60, 0.85);
      color: white;
      border: none;
      padding: .35rem .9rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: .875rem;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s;
    }

    .btn-nav-logout:hover {
      background: #c0392b;
      color: white;
      text-decoration: none;
    }

    .btn-nav-login {
      background: rgba(255, 255, 255, .15);
      color: white;
      border: 1.5px solid rgba(255, 255, 255, .4);
      padding: .35rem .9rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: .875rem;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s;
    }

    .btn-nav-login:hover {
      background: rgba(255, 255, 255, .25);
      color: white;
      text-decoration: none;
    }

    main {
      flex: 1;
      padding: 30px;
      background-color: #f5f6fa;
    }

    footer {
      background-color: #2c3e50;
      text-align: center;
      padding: 15px;
    }

    footer p {
      color: white;
    }
  </style>
</head>

<body>

  <nav>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/students">Students</a></li>
      <li><a href="/subjects">Subjects</a></li>
      <li><a href="/grades">Grades</a></li>
    </ul>

    <div class="nav-auth">
      {% if request.session.email %}
      <span class="user-greeting">Signed in as <strong>{{ request.session.email }}</strong></span>
      <a href="{% url 'profile' %}" class="nav-profile-link">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z" />
        </svg>
        Profile
      </a>
      <a href="{% url 'logout' %}" class="btn-nav-logout">Log out</a>
      {% else %}
      <a href="{% url 'login' %}" class="btn-nav-login">Sign in</a>
      {% endif %}
    </div>
  </nav>

  <main>
    {% block content %}
    {% endblock %}
  </main>

  <footer>
    <p>© 2026 School System</p>
  </footer>

</body>

</html>
